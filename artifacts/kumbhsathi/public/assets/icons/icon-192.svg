<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="#FF6F00"/>
  <!-- Inner decorative ring -->
  <circle cx="96" cy="96" r="88" fill="none" stroke="#FFD700" stroke-width="3" stroke-dasharray="8,4"/>
  <!-- Lotus petals (8 petals) -->
  <g transform="translate(96,96)" fill="#FFF8E1" opacity="0.9">
    <ellipse cx="0" cy="-42" rx="10" ry="22" transform="rotate(0)"/>
    <ellipse cx="0" cy="-42" rx="10" ry="22" transform="rotate(45)"/>
    <ellipse cx="0" cy="-42" rx="10" ry="22" transform="rotate(90)"/>
    <ellipse cx="0" cy="-42" rx="10" ry="22" transform="rotate(135)"/>
    <ellipse cx="0" cy="-42" rx="10" ry="22" transform="rotate(180)"/>
    <ellipse cx="0" cy="-42" rx="10" ry="22" transform="rotate(225)"/>
    <ellipse cx="0" cy="-42" rx="10" ry="22" transform="rotate(270)"/>
    <ellipse cx="0" cy="-42" rx="10" ry="22" transform="rotate(315)"/>
  </g>
  <!-- Inner lotus petals -->
  <g transform="translate(96,96)" fill="#FFD700" opacity="0.85">
    <ellipse cx="0" cy="-26" rx="7" ry="14" transform="rotate(22.5)"/>
    <ellipse cx="0" cy="-26" rx="7" ry="14" transform="rotate(67.5)"/>
    <ellipse cx="0" cy="-26" rx="7" ry="14" transform="rotate(112.5)"/>
    <ellipse cx="0" cy="-26" rx="7" ry="14" transform="rotate(157.5)"/>
    <ellipse cx="0" cy="-26" rx="7" ry="14" transform="rotate(202.5)"/>
    <ellipse cx="0" cy="-26" rx="7" ry="14" transform="rotate(247.5)"/>
    <ellipse cx="0" cy="-26" rx="7" ry="14" transform="rotate(292.5)"/>
    <ellipse cx="0" cy="-26" rx="7" ry="14" transform="rotate(337.5)"/>
  </g>
  <!-- Center circle -->
  <circle cx="96" cy="96" r="18" fill="#E64A19"/>
  <!-- OM symbol (simplified) -->
  <text x="96" y="103" text-anchor="middle" font-family="serif" font-size="22" fill="#FFD700" font-weight="bold">ॐ</text>
  <!-- App name -->
  <text x="96" y="158" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#FFF8E1" font-weight="bold" letter-spacing="1">KumbhSathi</text>
</svg>
